<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Viatura - STS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">STS - Controle de Viaturas</div>
        <div class="nav-links">
            <a href="index.html">Dashboard</a>
            <a href="cadastro.html" class="active">Cadastrar Viatura</a>
            <a href="relatorios.html">Relatórios</a>
        </div>
    </nav>

    <main>
        <div class="form-container">
            <h2>Cadastrar Nova Viatura</h2>
            <form id="vehicleForm">
                <div class="form-group">
                    <label for="regFab">REG-FAB:</label>
                    <input type="text" id="regFab" required pattern="\d{2}[A-Z]{2}\d{3}" placeholder="Ex: 12AB345">
                </div>

                <div class="form-group">
                    <label for="plate">Placa:</label>
                    <input type="text" id="plate" required>
                </div>

                <div class="form-group">
                    <label for="entryDate">Data de Entrada:</label>
                    <input type="date" id="entryDate" required>
                </div>

                <div class="form-group">
                    <label for="status">Status:</label>
                    <select id="status" required>
                        <option value="available">Disponível</option>
                        <option value="unavailable">Baixada</option>
                        <option value="external">Oficina Externa</option>
                    </select>
                </div>

                <div class="form-group workshop-fields" style="display: none;">
                    <label for="workshop">Oficina:</label>
                    <input type="text" id="workshop">
                </div>

                <div class="form-group workshop-fields" style="display: none;">
                    <label for="budget">Orçamento (R$):</label>
                    <input type="number" id="budget" step="0.01">
                </div>

                <div class="form-group">
                    <label for="issue">Observações:</label>
                    <textarea id="issue"></textarea>
                </div>

                <div class="form-group">
                    <label for="photo">Foto da Viatura:</label>
                    <input type="file" id="photo" accept="image/*">
                </div>

                <button type="submit" class="submit-btn">Cadastrar Viatura</button>
            </form>
        </div>
    </main>

    <script src="cadastro.js"></script>
</body>
</html>
